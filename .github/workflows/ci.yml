name: CI

# Corre en cada push a main y en cada PR lo que antes se chequeaba a mano
# (ver CLAUDE.md → "Diagnóstico rápido"). Evita repetir la caída del 13-07,
# cuando un import roto llegó a producción.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  api:
    name: API · sintaxis, import y parsers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Sintaxis de main.py
        run: python -c "import ast; ast.parse(open('main.py', encoding='utf-8').read()); print('OK sintaxis')"
      - name: import main (detecta imports rotos antes del deploy)
        run: python -c "import main; print('OK import main')"
      - name: Regresión de parsers de extracción
        run: python test_extraccion_parsers.py

  frontend:
    name: Frontend · type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit
